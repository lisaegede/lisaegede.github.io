<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Lisa Egede — Design Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.3.1/css/all.css" integrity="sha384-mzrmE5qonljUremFsqc01SB46JvROS7bZs3IO2EmfFsd15uHvIt+Y8vEf7N7fWAU" crossorigin="anonymous">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a18;
      --ink-mid: #4a4a46;
      --ink-soft: #8a8a84;
      --rule: #e2e0d8;
      --accent: #1D4ED8;
      --bg-light: #f9f9f7;
      --page: #ffffff;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      font-size: 10pt;
      line-height: 1.5;
      color: var(--ink);
      background: #e8e6df;
    }

    .portfolio-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      background: var(--page);
      padding: 40px 60px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
    }

    header {
      margin-bottom: 40px;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 20px;
    }

    .brand-logo-area {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .brand-title {
      font-family: 'DM Serif Display', serif;
      font-size: 28pt;
      font-weight: 400;
      color: var(--ink);
    }
    .brand-title em { font-style: italic; color: var(--accent); }

    .nav-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 15px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .nav-links a {
      color: var(--ink-mid);
      text-decoration: none;
      font-weight: 500;
      margin-right: 20px;
      font-size: 9.5pt;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    .section-heading {
      font-family: 'DM Serif Display', serif;
      font-size: 20pt;
      color: var(--ink);
      margin: 40px 0 20px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 5px;
    }

    /* Case Studies Styling */
    .case-study {
      background: var(--bg-light);
      border: 1px solid var(--rule);
      border-radius: 6px;
      padding: 35px;
      margin-bottom: 35px;
    }

    .case-study-header {
      margin-bottom: 20px;
    }

    .meta-tag {
      font-size: 8.5pt;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
      font-weight: 500;
    }

    .case-study-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22pt;
      font-weight: 400;
      color: var(--ink);
      margin-top: 5px;
    }

    .project-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
      margin: 25px 0;
    }
    @media (min-width: 768px) {
      .project-grid { grid-template-columns: 1fr 1fr; }
    }

    .grid-img {
      width: 100%;
      height: auto;
      border-radius: 4px;
      border: 1px solid var(--rule);
      display: block;
    }

    .center-img-wrapper {
      text-align: center;
      margin: 25px 0;
    }
    .center-img-wrapper img {
      max-width: 100%;
      height: auto;
      border-radius: 4px;
      border: 1px solid var(--rule);
    }

    .caption {
      font-size: 8.5pt;
      color: var(--ink-soft);
      font-style: italic;
      text-align: center;
      margin-top: -15px;
      margin-bottom: 20px;
    }

    h3 {
      font-size: 12pt;
      font-weight: 500;
      color: var(--ink);
      margin: 25px 0 10px;
    }

    p {
      color: var(--ink-mid);
      margin-bottom: 15px;
      font-size: 10pt;
    }

      border-left: 3px solid var(--accent);
      padding-left: 15px;

      background:
